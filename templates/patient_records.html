<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            color: #333;
            line-height: 1.5;
        }

        .header {
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .patient {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 style="margin:0;">Medical Report</h2>
    </div>

    <div class="patient">
        <p><strong>Patient:</strong> {{ patient_name }}</p>
        <p><strong>Age:</strong> {{ age }}</p>
        <p><strong>Date Generated:</strong> {{ date }}</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Prescription</th>
            </tr>
        </thead>
        <tbody>
            {% for h in history %}
            <tr>
                <td>{{ h.date }}</td>
                <td>{{ h.doctor_name }}</td>
                <td>{{ h.diagnosis }}</td>
                <td>{{ h.prescription or 'None' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
